global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "gateway_service"
    static_configs:
      - targets: ["gateway_service:8000"]

  - job_name: "webhook_service"
    static_configs:
      - targets: ["webhook_service:8001"]

  - job_name: "reviewer_service"
    static_configs:
      - targets: ["reviewer_service:8002"]

  - job_name: "learner_service"
    static_configs:
      - targets: ["learner_service:8003"]
